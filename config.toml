# 1. 基础设置
hostname = "asus-router"         # 对应 --hostname
instance_name = "default"        # 默认实例名称
ipv4 = "10.126.126.133"          # 对应 -i (固定的虚拟局域网 IP)

# 2. 组网身份凭证
[network_identity]
network_name = "binbatnet"       # 对应 --network-name
network_secret = "zhuanfalun"    # 对应 --network-secret

# 3. 节点列表
[peer_list]
# 对应脚本中的三个 -p 参数
tcp = ["tcp://mutton.binbat.com:11010"]
udp = ["udp://mutton.binbat.com:11010"]
wss = ["wss://mutton.binbat.com:11011"]

# 4. 旁路路由/子网代理
[network]
proxy_networks = ["192.168.133.0/24"] # 对应 --proxy-networks (将路由器局域网网段代理出去)